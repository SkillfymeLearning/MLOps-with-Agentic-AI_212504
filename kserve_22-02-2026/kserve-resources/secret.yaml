apiVersion: v1
kind: Secret
metadata:
  name: minio-creds
  namespace: kubeflow
  annotations:
     serving.kserve.io/s3-endpoint: minio-service.kubeflow:9000 # Your MinIO URL
     serving.kserve.io/s3-usehttps: "0" # "1" if using HTTPS
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minio
  AWS_SECRET_ACCESS_KEY: minio123