#   name: pipeline-runner-kserve-binding
#   namespace: kubeflow
# subjects:
# - kind: ServiceAccount
#   name: pipeline-runner
#   namespace: kubeflow
# roleRef:
#   kind: ClusterRole
#   name: kubeflow-admin # Or 'edit', or a specific kserve role
#   apiGroup: rbac.authorization.k8s.io

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kserve-pipeline-manager
  namespace: kubeflow
rules:
- apiGroups: ["serving.kserve.io"]
  resources: ["inferenceservices"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-pipeline-to-kserve
  namespace: kubeflow
subjects:
- kind: ServiceAccount
  name: pipeline-runner
  namespace: kubeflow
roleRef:
  kind: Role
  name: kserve-pipeline-manager
  apiGroup: rbac.authorization.k8s.io