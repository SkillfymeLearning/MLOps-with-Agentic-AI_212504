# Example: .github/workflows/ml-deploy.yaml (in YOUR repo)
#
# This workflow calls the reusable ci.yaml from the hpa-mlops repo.
# Copy this file to your repository's .github/workflows/ directory.
#
# Prerequisites:
#   - The hpa-mlops repo must be accessible (same org or public)
#   - Set secrets: KUBECONFIG, SLACK_WEBHOOK (optional)
#
# Usage:
#   - Go to Actions → ML Deploy → Run workflow
#   - Select action: staging, rollback, or prod

name: ML Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - rollback
          - prod
      dry_run:
        description: "Dry run (preview only)"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    # Call the reusable workflow from hpa-mlops repo
    # Format: {owner}/{repo}/.github/workflows/{filename}@{ref}
    uses: ksarma/hpa-mlops/.github/workflows/ci.yaml@main
    with:
      action: ${{ github.event.inputs.action }}
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
      # Optional overrides:
      # registry: "my-registry.example.com/my-model"
      # namespace: "my-namespace"
      # config_path: "config/ml-model-versions.yaml"
    secrets:
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
